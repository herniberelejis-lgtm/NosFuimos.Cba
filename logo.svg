<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Fondo circular -->
  <circle cx="100" cy="100" r="98" fill="#1B3F7A"/>
  <!-- Borde blanco fino -->
  <circle cx="100" cy="100" r="92" fill="none" stroke="white" stroke-width="2" stroke-dasharray="5,3"/>

  <!-- Texto "Nos" -->
  <text x="100" y="68"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="36" font-weight="bold" fill="white">Nos</text>

  <!-- Avión (simplificado, apuntando arriba-derecha) -->
  <!-- Fuselaje -->
  <path d="M76,108 L124,92" stroke="white" stroke-width="5" stroke-linecap="round"/>
  <!-- Ala principal -->
  <path d="M88,104 L96,82 L108,96" fill="white"/>
  <!-- Cola -->
  <path d="M118,94 L124,80 L128,92" fill="white"/>

  <!-- Texto "fuimos" -->
  <text x="100" y="140"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="30" font-weight="bold" fill="white">fuimos</text>

  <!-- Texto "Cba" -->
  <text x="100" y="168"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="22" fill="white" opacity="0.9">Cba</text>
</svg>
